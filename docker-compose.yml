# Orbit Wars Lab — one-command local launcher.
# Usage:  docker compose up        (then open http://localhost:6001)
#
# The single `app` service runs the Python backend on 8000 and also serves
# the prebuilt Vite bundle at the same origin. We publish it as :6001 to
# match the native-dev convention.

services:
  app:
    build: .
    image: orbit-wars-lab:latest
    container_name: orbit-wars-lab
    # Drop to the host user so files written to volumes are owned by you,
    # not root. Defaults to UID 1000 (typical Linux); macOS users can set
    # UID=$(id -u) GID=$(id -g) in a .env file next to this compose file.
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${PORT:-6001}:8000"
    # Volumes mount host folders over the image — changes are live, no rebuild.
    # `agents/` is bidirectional: the image ships 9 agents, which you see in
    # your local ./agents after the first `docker compose up`. Drop new ones
    # into ./agents/mine/<name>/ and the container picks them up immediately.
    # `runs/` persists tournaments + leaderboard + replays across restarts.
    volumes:
      - ./agents:/app/agents
      - ./runs:/app/runs
    restart: unless-stopped
